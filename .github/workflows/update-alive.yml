name: Update 猫猫鸡 alive counter

on:
  schedule:
    # 每 5 分钟刷新一次，减少无意义 commit；秒级请看 live.html
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/generate-alive.mjs"
      - ".github/workflows/update-alive.yml"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate alive.svg
        run: node scripts/generate-alive.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/alive.svg
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "chore: refresh 猫猫鸡 alive counter"
          git push
